services:
  postgres:
    image: postgres:17.6
    container_name: skopeo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: skopeo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - skopeo-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skopeo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  skopeo-postgres-data:
