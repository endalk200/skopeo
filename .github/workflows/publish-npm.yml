name: Stage npm Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stage:
    name: Stage @skopeo/cli
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    outputs:
      staged: ${{ steps.stage.outputs.staged }}
      version: ${{ steps.package.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        # actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Set up npm
        run: npm install -g npm@11.15.0

      - name: Set up Bun
        # oven-sh/setup-bun@v2
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit release dependencies
        run: bun run release:audit

      - name: Check formatting
        run: bun run format:check

      - name: Check types
        run: bun run check-types

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify npm package
        run: bun run release:verify

      - name: Smoke test packed npm package
        run: bun run release:smoke

      - name: Read package version
        id: package
        run: |
          version="$(node -p 'require("./apps/cli/package.json").version')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Stage package on npm
        id: stage
        working-directory: apps/cli
        env:
          PKG_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "@skopeo/cli@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "Version ${PKG_VERSION} already exists on npm; skipping staging."
            echo "staged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npm stage publish --access public --tag latest --provenance
          echo "staged=true" >> "$GITHUB_OUTPUT"

  github-release:
    name: Draft GitHub Release
    needs: stage
    if: needs.stage.outputs.staged == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Create tag and draft release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.stage.outputs.version }}
        run: |
          tag="skopeo-cli-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; skipping tag push."
          else
            git tag "$tag" "$GITHUB_SHA"
            git push origin "$tag"
          fi

          cat > release-notes.md <<EOF
          @skopeo/cli ${VERSION}

          The npm package has been staged and is pending npm-side maintainer approval with 2FA.
          Publish this GitHub Release only after approving the staged package in npm.
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "Skopeo CLI v${VERSION}" --notes-file release-notes.md
          else
            gh release create "$tag" --draft --title "Skopeo CLI v${VERSION}" --notes-file release-notes.md
          fi
