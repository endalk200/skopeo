name: Release PR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-pr:
    name: Create Release PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Bun
        # oven-sh/setup-bun@v2
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Version packages
        run: bun run version-packages

      - name: Create or update release pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain --untracked-files=all)" ]; then
            echo "No changesets found; release PR is up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c changeset-release/main
          git add .
          git commit -m "chore: version packages"
          git push --force-with-lease origin HEAD:changeset-release/main

          if gh pr view changeset-release/main --json number >/dev/null 2>&1; then
            gh pr edit changeset-release/main --title "Version Packages" --body "Automated Changesets version PR."
          else
            gh pr create --base main --head changeset-release/main --title "Version Packages" --body "Automated Changesets version PR."
          fi
