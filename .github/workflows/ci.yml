name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun dependencies
        uses: ./.github/actions/setup-bun-dependencies

      - name: Restore Turbo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-format-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-format-
            ${{ runner.os }}-turbo-

      - name: Check formatting
        run: bun run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun dependencies
        uses: ./.github/actions/setup-bun-dependencies

      - name: Restore Turbo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-lint-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-lint-
            ${{ runner.os }}-turbo-

      - name: Lint
        run: bun run lint

  check-types:
    name: Check Types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun dependencies
        uses: ./.github/actions/setup-bun-dependencies

      - name: Restore Turbo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-check-types-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-check-types-
            ${{ runner.os }}-turbo-

      - name: Check types
        run: bun run check-types

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun dependencies
        uses: ./.github/actions/setup-bun-dependencies

      - name: Restore Turbo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-test-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-test-
            ${{ runner.os }}-turbo-

      - name: Test
        run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun dependencies
        uses: ./.github/actions/setup-bun-dependencies

      - name: Restore Turbo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-build-
            ${{ runner.os }}-turbo-

      - name: Build
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: build-outputs
          if-no-files-found: warn
          retention-days: 7
          path: |
            apps/api/dist/**
            apps/cli/dist/**
            apps/web/.next/**
            packages/**/dist/**
            !apps/web/.next/cache/**

  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - format
      - lint
      - check-types
      - test
      - build
    if: ${{ always() }}
    steps:
      - name: Verify split CI jobs
        run: |
          failed=()

          for check in \
            "Format:${{ needs.format.result }}" \
            "Lint:${{ needs.lint.result }}" \
            "Check Types:${{ needs['check-types'].result }}" \
            "Test:${{ needs.test.result }}" \
            "Build:${{ needs.build.result }}"
          do
            name="${check%%:*}"
            result="${check#*:}"

            if [[ "${result}" != "success" ]]; then
              failed+=("${name} (${result})")
            fi
          done

          if (( ${#failed[@]} > 0 )); then
            printf 'Quality Gate failed because these jobs did not succeed:\n'
            printf -- '- %s\n' "${failed[@]}"
            exit 1
          fi

          echo "Quality Gate passed."
