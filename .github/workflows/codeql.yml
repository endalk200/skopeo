name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Initialize CodeQL
        # github/codeql-action/init@v4.35.5
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        # github/codeql-action/analyze@v4.35.5
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba
