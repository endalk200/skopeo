name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # actions/checkout@v5.0.0
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Initialize CodeQL
        # github/codeql-action/init@v4.31.4
        uses: github/codeql-action/init@6f7376048dd6be43ea34c6bd4a3ecef7d7abd847
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        # github/codeql-action/analyze@v4.31.4
        uses: github/codeql-action/analyze@6f7376048dd6be43ea34c6bd4a3ecef7d7abd847
