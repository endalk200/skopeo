version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
      timezone: Etc/UTC
    groups:
      bun-dependencies:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
      day: wednesday
      time: "07:00"
      timezone: Etc/UTC

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
      day: wednesday
      time: "07:00"
      timezone: Etc/UTC
