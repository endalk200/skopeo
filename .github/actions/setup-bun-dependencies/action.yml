name: Set up Bun dependencies
description: Resolve the repository Bun version, install Bun, restore dependency cache, and install dependencies.

runs:
  using: composite
  steps:
    - name: Read Bun version
      id: bun
      shell: bash
      run: |
        bun_version="$(
          node - <<'NODE'
        const { packageManager } = require("./package.json");
        const match = /^bun@(.+)$/.exec(packageManager ?? "");

        if (!match) {
          console.error('Expected root package.json packageManager to be "bun@<version>".');
          process.exit(1);
        }

        process.stdout.write(match[1]);
        NODE
        )"

        echo "version=${bun_version}" >> "$GITHUB_OUTPUT"

    - name: Set up Bun
      # oven-sh/setup-bun@v2
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      with:
        bun-version: ${{ steps.bun.outputs.version }}

    - name: Restore Bun dependency cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ~/.bun/install/cache
          node_modules
        key: ${{ runner.os }}-bun-${{ steps.bun.outputs.version }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-${{ steps.bun.outputs.version }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
